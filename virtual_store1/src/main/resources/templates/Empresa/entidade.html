<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Empresa</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
</head>
<body>

<div th:replace="~{fragments/menu_simples :: menu}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}"><i class="fas fa-home"></i> Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/empresa/criterio}">Empresas</a></li>
            <li class="breadcrumb-item active">Visualizar</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="fas fa-building"></i>
            Detalhes da Empresa
        </h2>
        <div>
            <a th:href="@{/empresa/editar/{id}(id=${empresa.id})}" class="btn btn-warning me-2">
                <i class="fas fa-edit"></i> Editar
            </a>
            <a th:href="@{/empresa/excluir/{id}(id=${empresa.id})}"
               class="btn btn-danger me-2"
               onclick="return confirm('Tem certeza que deseja excluir esta empresa?')">
                <i class="fas fa-trash"></i> Excluir
            </a>
            <a th:href="@{/empresa/criterio}" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-info text-white">
            <h5 class="mb-0"><i class="fas fa-info-circle"></i> Informações</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">ID:</label>
                    <p class="form-control-plaintext" th:text="${empresa.id}">1</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Razão Social:</label>
                    <p class="form-control-plaintext" th:text="${empresa.nome}">Razão Social</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nome Fantasia:</label>
                    <p class="form-control-plaintext" th:text="${empresa.nomeFantasia}">Nome Fantasia</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">CNPJ:</label>
                    <p class="form-control-plaintext" th:text="${empresa.cnpj}">00.000.000/0000-00</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">E-mail:</label>
                    <p class="form-control-plaintext" th:text="${empresa.email}">empresa@email.com</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Telefone:</label>
                    <p class="form-control-plaintext" th:text="${empresa.telefone}">(00) 0000-0000</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Inscrição Estadual:</label>
                    <p class="form-control-plaintext" th:text="${empresa.inscricaoEstadual}">123456789</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Inscrição Municipal:</label>
                    <p class="form-control-plaintext" th:text="${empresa.inscricaoMunicipal}">987654321</p>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Categoria:</label>
                    <p class="form-control-plaintext" th:text="${empresa.categoria}">Categoria</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer_simples :: footer}"></div>

<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
</body>
</html>
