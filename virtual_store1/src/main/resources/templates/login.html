<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Login - Virtual Store')}">
<body>
<div th:replace="~{fragments/header :: content}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0">
                        <i class="fas fa-lock me-2"></i>Virtual Store
                    </h3>
                    <p class="small mb-0 mt-2">Faça login para acessar o sistema</p>
                </div>

                <div class="card-body p-4">
                    <!-- MENSAGEM DE ERRO -->
                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Erro!</strong> Usuário ou senha inválidos!
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- MENSAGEM DE LOGOUT -->
                    <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        Você saiu do sistema com sucesso!
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- FORMULÁRIO DE LOGIN -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="fas fa-user me-2"></i>Usuário:
                            </label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Digite seu usuário" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="fas fa-key me-2"></i>Senha:
                            </label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Digite sua senha" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Entrar
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-footer text-center py-3 bg-light">
                    <div class="small">
                        <a href="#" class="text-decoration-none text-primary">
                            <i class="fas fa-question-circle me-1"></i>Esqueceu sua senha?
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
