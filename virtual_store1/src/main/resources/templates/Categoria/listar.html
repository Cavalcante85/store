<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Lista de Categorias')}">
<body>
<!-- REMOVA O th:replace daqui - NÃO use replace no conteúdo -->
<div th:replace="~{fragments/header :: content}"></div>

<!-- TODO O CONTEÚDO DEVE ESTAR FORA DO div DO FRAGMENTO -->
<div class="container mt-4">
    <h2>Lista de Categorias</h2>

    <div th:if="${mensagem}" class="alert alert-dismissible fade show"
         th:classappend="'alert-' + ${tipoMensagem}" role="alert">
        <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="mb-3">
        <a th:href="@{/categoria/cadastrar}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nova Categoria
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descrição</th>
                <th>Empresa</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="categoria : ${categorias}">
                <td th:text="${categoria.id}">1</td>
                <td th:text="${categoria.descricao}">Categoria</td>
                <td th:text="${categoria.empresa?.nomeFantasia ?: categoria.empresa?.nome}">Empresa</td>
                <td>
                    <a th:href="@{/categoria/editar/{id}(id=${categoria.id})}"
                       class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i> Editar
                    </a>
                    <a th:href="@{/categoria/excluir/{id}(id=${categoria.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Tem certeza que deseja excluir esta categoria?')">
                        <i class="fas fa-trash"></i> Excluir
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
