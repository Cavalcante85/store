<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Categorias</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
</head>
<body>

<!-- MENU -->
<div th:replace="~{fragments/menu_simples :: menu}"></div>

<div class="container mt-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}"><i class="fas fa-home"></i> Home</a></li>
            <li class="breadcrumb-item active">Categorias</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="fas fa-tags"></i>
            Lista de Categorias
        </h2>

        <!-- Botão Voltar para Home -->
        <a th:href="@{/}" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Voltar para Home
        </a>
    </div>

    <div th:if="${mensagem}" class="alert alert-dismissible fade show"
         th:classappend="'alert-' + ${tipoMensagem}" role="alert">
        <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="mb-3">
        <a th:href="@{/categoria/cadastrar}" class="btn btn-success">
            <i class="fas fa-plus"></i> Nova Categoria
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descrição</th>
                <th>Empresa</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="categoria : ${categorias}">
                <td th:text="${categoria.id}">1</td>
                <td th:text="${categoria.descricao}">Categoria</td>
                <td th:text="${categoria.empresa?.nomeFantasia ?: categoria.empresa?.nome}">Empresa</td>
                <td>
                    <a th:href="@{/categoria/editar/{id}(id=${categoria.id})}"
                       class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i> Editar
                    </a>
                    <a th:href="@{/categoria/excluir/{id}(id=${categoria.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Tem certeza que deseja excluir esta categoria?')">
                        <i class="fas fa-trash"></i> Excluir
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer_simples :: footer}"></div>

<!-- Scripts -->
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
</body>
</html>
