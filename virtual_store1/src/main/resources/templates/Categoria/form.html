<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Cadastro de Categoria')}">
<body>
<div th:replace="~{fragments/header :: content}"></div>

<div class="container mt-4">
  <h2 th:text="${categoria.id == null} ? 'Nova Categoria' : 'Editar Categoria'"></h2>

  <form th:action="${categoria.id == null} ? @{/categoria/salvar} : @{/categoria/atualizar/{id}(id=${categoria.id})}"
        th:object="${categoria}"
        method="post"
        class="mt-4">

    <div class="mb-3">
      <label for="descricao" class="form-label">Descrição:</label>
      <input type="text"
             class="form-control"
             id="descricao"
             name="descricao"
             th:value="*{descricao}"
             required>
    </div>

    <div class="mb-3">
      <label for="empresa_id" class="form-label">Empresa:</label>
      <select class="form-control"
              id="empresa_id"
              name="empresa_id"
              required>
        <option value="">Selecione uma empresa</option>
        <option th:each="empresa : ${empresas}"
                th:value="${empresa.id}"
                th:text="${empresa.nomeFantasia ?: empresa.nome}"
                th:selected="${categoria.empresa?.id == empresa.id}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a th:href="@{/categoria}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
