<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pessoaFisica.id == null} ? 'Nova Pessoa Física' : 'Editar Pessoa Física'">Cadastrar Pessoa Física</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
</head>
<body>

<div th:replace="~{fragments/menu_simples :: menu}"></div>

<div class="container mt-4">

    <!-- ADICIONE ESTE BLOCO AQUI - LOGO APÓS A ABERTURA DO CONTAINER -->
    <div th:if="${mensagem}" class="alert alert-dismissible fade show"
         th:classappend="'alert-' + ${tipoMensagem}" role="alert">
        <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>


    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}"><i class="fas fa-home"></i> Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/pessoa-fisica}">Pessoas Físicas</a></li>
            <li class="breadcrumb-item active" th:text="${pessoaFisica.id == null} ? 'Nova' : 'Editar'"></li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="fas" th:class="${pessoaFisica.id == null} ? 'fa-user-plus' : 'fa-user-edit'"></i>
            <span th:text="${pessoaFisica.id == null} ? 'Nova Pessoa Física' : 'Editar Pessoa Física'"></span>
        </h2>

        <a th:href="@{/pessoa-fisica}" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Voltar para Lista
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="fas" th:class="${pessoaFisica.id == null} ? 'fa-plus' : 'fa-edit'"></i>
                Dados da Pessoa Física
            </h5>
        </div>
        <div class="card-body">
            <form th:action="@{/pessoa-fisica/salvar}" method="post">
                <input type="hidden" name="id" th:value="${pessoaFisica.id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nome" class="form-label">Nome Completo:</label>
                        <input type="text"
                               class="form-control"
                               id="nome"
                               name="nome"
                               th:value="${pessoaFisica.nome}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label for="cpf" class="form-label">CPF:</label>
                        <input type="text"
                               class="form-control"
                               id="cpf"
                               name="cpf"
                               th:value="${pessoaFisica.cpf}"
                               placeholder="000.000.000-00"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label">E-mail:</label>
                        <input type="email"
                               class="form-control"
                               id="email"
                               name="email"
                               th:value="${pessoaFisica.email}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label for="telefone" class="form-label">Telefone:</label>
                        <input type="text"
                               class="form-control"
                               id="telefone"
                               name="telefone"
                               th:value="${pessoaFisica.telefone}"
                               placeholder="(00) 00000-0000"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label for="dataNascimento" class="form-label">Data de Nascimento:</label>
                        <input type="date"
                               class="form-control"
                               id="dataNascimento"
                               name="dataNascimento"
                               th:value="${#dates.format(pessoaFisica.dataNascimento, 'yyyy-MM-dd')}"
                               required>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Salvar
                    </button>
                    <a th:href="@{/pessoa-fisica}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer_simples :: footer}"></div>

<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
</body>
</html>
